name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          go build -o dist/grok2api-go-linux-amd64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o dist/grok2api-go-windows-amd64.exe ./cmd/server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grok2api-go-binaries
          path: dist/*

      - name: Validate Docker build
        run: docker build -t grok2api-go:test .
